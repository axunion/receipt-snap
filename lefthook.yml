pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "**/*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "**/*.{ts,tsx,astro}"
      run: pnpm exec tsc --noEmit
